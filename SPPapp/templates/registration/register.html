{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-danger">Register</h1>
    <form method="post" class="bg-dark p-4 rounded">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-danger btn-lg">Register</button>
    </form>
</div>
{% endblock %}
